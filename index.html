<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>To-Do List 📝</h1>
      <div class="input-section">

          name="task1"
          id="task1"
          placeholder="Enter your task"

      </div>
      <ul id="taskList"></ul>
    </div>
    <script src="index.js"></script>
  </body>
